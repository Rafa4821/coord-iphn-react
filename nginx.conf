# Configuración COMPLETA de Nginx para Coordenadas Móviles
# Incluye: Seguridad, HTTPS, Compresión, Caché, VPN Support

# Redirigir HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com;
    
    # Redirigir todo a HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuración HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tu-dominio.com;
    
    # Rutas SSL (ajustar según tu configuración)
    # ssl_certificate /etc/ssl/certs/tu-dominio.crt;
    # ssl_certificate_key /etc/ssl/private/tu-dominio.key;
    
    # Configuración SSL moderna
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Directorio raíz
    root /var/www/coordenadas-iphone-react/dist;
    index index.html;
    
    # Tamaño máximo de carga (para screenshots grandes)
    client_max_body_size 20M;
    
    # ==================== CABECERAS DE SEGURIDAD ====================
    
    # Prevenir MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Prevenir clickjacking (SAMEORIGIN permite uso en red interna)
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Protección XSS (legacy)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Prevenir descarga automática en IE
    add_header X-Download-Options "noopen" always;
    
    # Política de cross-domain
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    
    # Política de referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Política de permisos
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    
    # HSTS - Forzar HTTPS (1 año)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;
    
    # CORS - Soporte para VPN corporativa (descomentar si es necesario)
    # add_header Access-Control-Allow-Origin "*" always;
    # add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    
    # ==================== COMPRESIÓN GZIP ====================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # ==================== CONFIGURACIÓN SPA ====================
    
    location / {
        # Intentar servir archivo, luego directorio, luego index.html (SPA)
        try_files $uri $uri/ /index.html;
    }
    
    # ==================== CACHÉ DE ASSETS ESTÁTICOS ====================
    
    # JavaScript y CSS con hash (immutable)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Imágenes y fuentes
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # No cachear index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    
    # ==================== LOGS ====================
    
    access_log /var/log/nginx/coordenadas-access.log;
    error_log /var/log/nginx/coordenadas-error.log warn;
}
